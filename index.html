<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>FancyZones Mythic</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="renderer.js"></script>
</head>
<body>
  <div id="toolbar">
    <input id="profileName" placeholder="Tên Profile">
    <input id="profileColor" type="color" value="#0078D4">
    <button onclick="addProfile()">➕ Profile</button>
    <select id="profileList" onchange="switchProfile()"></select>
    <input id="layoutName" placeholder="Tên Layout">
    <button onclick="saveLayout()">💾 Lưu Layout</button>
    <button onclick="applyLayoutElectron()">🚀 Apply Layout</button>
    <button onclick="applyProfile()">🌐 Apply Profile</button>
    <button onclick="openOverlay()">🖼 Overlay</button>
    <button onclick="openSettings()">⚙ Settings</button>
  </div>
  <div id="canvas"></div>
</body>
</html>
